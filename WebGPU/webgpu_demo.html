<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flat GPU Solver Prototype</title>
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1100px; }
    textarea { width: 100%; min-height: 220px; font-family: ui-monospace, monospace; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    button { margin-right: 8px; }
  </style>
  <script src="flat_solver_core.js"></script>
  <!--<script src="flat_solver_core_es.js"></script>-->
</head>
<body>
  <h1>Flat GPU Solver Prototype</h1>
  <p>Literal span rewrites on a flat token arena. CPU solver is active. WebGPU probe and shader scaffold are included.</p>
  <textarea id="input">// Axioms and Lemmas
1 + 1 = 2
2 + 2 = 4

// Prove
1 + 2 + 1 = 4</textarea>
  <div style="margin: 12px 0;">
    <button id="runCpu">Run CPU solver</button>
    <button id="probeGpu">Probe WebGPU</button>
  </div>
  <div class="row">
    <div>
      <h2>Result</h2>
      <pre id="output"></pre>
    </div>
    <div>
      <h2>Status</h2>
      <pre id="status"></pre>
    </div>
  </div>
  <script type="module">
    //import { solveFlat, WGSL_MATCH_LITERAL } from './flat_solver_core_es.js';

    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    document.getElementById('runCpu').addEventListener('click', () => {
      try {
        const t0 = performance.now();
        const result = solveFlat(input.value, { maxIterations: 1e6, batchSize: 64 });
        const t1 = performance.now();
        output.textContent = result.proof + `\n\nRuntime: ${(t1 - t0).toFixed(3)} ms\n\n` + JSON.stringify(result.stats, null, 2);
      } catch (err) {
        output.textContent = String(err?.stack || err);
      }
    });

    document.getElementById('probeGpu').addEventListener('click', async () => {
      const report = { hasNavigatorGpu: !!navigator.gpu };
      if (!navigator.gpu) {
        status.textContent = JSON.stringify(report, null, 2);
        return;
      }
      const adapter = await navigator.gpu.requestAdapter();
      report.adapterFound = !!adapter;
      if (!adapter) {
        status.textContent = JSON.stringify(report, null, 2);
        return;
      }
      const device = await adapter.requestDevice();
      report.deviceReady = !!device;
      report.shaderLength = WGSL_MATCH_LITERAL.length;
      try {
        device.createShaderModule({ code: WGSL_MATCH_LITERAL });
        report.shaderModuleCreated = true;
      } catch (e) {
        report.shaderModuleCreated = false;
        report.shaderError = String(e);
      }
      status.textContent = JSON.stringify(report, null, 2);
    });
  </script>
</body>
</html>
